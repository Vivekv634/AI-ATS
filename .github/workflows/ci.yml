name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint tools
        run: pip install ruff black

      - name: ruff check
        run: ruff check src/ tests/

      - name: black check
        run: black --check src/ tests/

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install lightweight dependencies
        # Install only the deps needed for unit tests — ML heavyweights
        # (torch, transformers, sentence-transformers, spacy, chromadb, faiss-cpu,
        #  shap, lime, PyQt6) are mocked in tests and skipped here to keep CI fast.
        run: |
          pip install \
            pydantic>=2.0.0 \
            pydantic-settings>=2.0.0 \
            pymongo>=4.6.0 \
            python-dotenv>=1.0.0 \
            loguru>=0.7.0 \
            rich>=13.0.0 \
            typer>=0.9.0 \
            numpy>=1.24.0 \
            pandas>=2.0.0 \
            scikit-learn>=1.3.0 \
            pytest>=7.4.0 \
            pytest-cov>=4.1.0 \
            pytest-asyncio>=0.21.0

      - name: Install project (no extras)
        run: pip install -e . --no-deps

      - name: Run unit tests
        run: |
          python -m pytest tests/unit/ \
            --tb=short \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            -q

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install mypy and stubs
        run: |
          pip install mypy pydantic pydantic-settings loguru pymongo

      - name: Install project (no extras)
        run: pip install -e . --no-deps

      - name: Run mypy
        run: |
          python -m mypy src/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --exclude "src/ui/" \
            --exclude "src/cli.py"
        # UI and CLI excluded: Qt stubs and typer stubs are not installed in CI
        continue-on-error: true  # type errors are non-blocking until stubs are complete
