# Alembic configuration for AI-ATS PostgreSQL migrations.
#
# The database URL is resolved at runtime from PostgresSettings in
# src.utils.config (see alembic/env.py). Do NOT hardcode credentials here.
#
# Usage:
#   alembic upgrade head            # apply all pending migrations
#   alembic revision -m "message"   # create a new empty migration
#   alembic revision --autogenerate -m "message"   # diff against models
#   alembic downgrade -1            # roll back one step
#   alembic current                 # show current revision

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Empty — real URL is injected in env.py from PostgresSettings.sync_uri.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
